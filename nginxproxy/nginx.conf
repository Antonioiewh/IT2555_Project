# /etc/nginx/nginx.conf
# Load the ModSecurity Nginx module
load_module modules/ngx_http_modsecurity_module.so;

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Security: Hide nginx version
    server_tokens off;

    upstream flask_backend {
        ip_hash;  # Add session persistence for CSRF
        server app1:5000;
        server app2:5000;
        server app3:5000;
    }

    # INCREASED rate limits for ngrok and CSRF compatibility
    limit_req_zone $binary_remote_addr zone=api_limit:50m rate=100r/s;  # Increased for ngrok
    limit_conn_zone $binary_remote_addr zone=conn_limit:50m;

    # Basic nginx configuration
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    log_format security '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for" '
                        'Host:"$host" RequestHost:"$http_host"';
    
    access_log /var/log/nginx/access.log security;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 2048M;

    # SECURITY: Map to detect valid hostnames
    map $http_host $is_valid_host {
        default 0;
        "localhost" 1;
        "localhost:80" 1;
        "localhost:443" 1;
        "localhost:5000" 1;
        # FIXED: Specific ngrok domain + wildcards
        "glowing-briefly-cicada.ngrok-free.app" 1;
        "~^.+\.ngrok\.io$" 1;
        "~^.+\.ngrok-free\.app$" 1;
        "~^.+\.ngrok\.app$" 1;
        "~^.+\.ngrok\.dev$" 1;
    }

    # Map for ngrok detection
    map $http_host $is_ngrok {
        default 0;
        "glowing-briefly-cicada.ngrok-free.app" 1;
        "~^.+\.ngrok\.io$" 1;
        "~^.+\.ngrok-free\.app$" 1;
        "~^.+\.ngrok\.app$" 1;
        "~^.+\.ngrok\.dev$" 1;
    }

    # DEFAULT SERVER: Block invalid hosts
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        
        # Dummy SSL certificates for default server
        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        
        server_name _;
        return 444;  # Close connection
    }

    # HTTP SERVER - Redirect to HTTPS
    server {
        listen 80;
        listen [::]:80;
        # FIXED: Specific ngrok domain + localhost
        server_name localhost glowing-briefly-cicada.ngrok-free.app;
        
        # Block invalid hosts
        if ($is_valid_host = 0) {
            return 444;
        }
        
        # Redirect HTTP to HTTPS
        return 301 https://$host$request_uri;
    }

    # HTTPS SERVER - Main application
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        # FIXED: Specific ngrok domain + localhost
        server_name localhost glowing-briefly-cicada.ngrok-free.app;

        # Block invalid hosts first
        if ($is_valid_host = 0) {
            return 444;
        }

        # SSL configuration - UNCHANGED
        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_session_cache shared:SSL:50m;
        ssl_session_timeout 1d;

        # Security headers - UNCHANGED
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains;" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # CONDITIONAL ModSecurity - Disable for ngrok to avoid blocking
        modsecurity off;  # Disabled globally for ngrok compatibility

        # Static files - UNCHANGED
        location /static/ {
            alias /var/www/static/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
            add_header Vary "Accept-Encoding";
            
            # Security headers for static content
            add_header X-Content-Type-Options nosniff;
            add_header X-Frame-Options DENY;
            
            # Handle common image formats with long cache
            location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|bmp|tiff|avif)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
            
            # CSS and JS files
            location ~* \.(css|js|map)$ {
                expires 1w;
                add_header Cache-Control "public";
                access_log off;
            }
            
            # Font files
            location ~* \.(woff2?|ttf|eot|otf)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
            
            # Fallback to Flask if file not found
            try_files $uri @flask_backend;
        }

        # WebSocket support - FIXED HOST HEADER CONSISTENCY
        location /socket.io/ {
            # More permissive rate limiting for WebSocket
            limit_req zone=api_limit burst=100 nodelay;
            
            proxy_pass http://flask_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # FIXED: Use original host for CSRF consistency
            proxy_set_header Host $http_host;  # ŌåÉ CHANGED: Was localhost
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Add original host for Flask to detect ngrok
            proxy_set_header X-Original-Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            
            # Extended timeouts for WebSocket
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Main application - CSRF-COMPATIBLE for ngrok
        location / {
            # GREATLY INCREASED rate limiting for ngrok compatibility
            limit_req zone=api_limit burst=50 nodelay;
            limit_req_status 429;
            limit_conn conn_limit 50;
            
            # NO cache control headers that interfere with CSRF tokens
            
            proxy_pass http://flask_backend;
            
            # FIXED: Send original host to Flask for CSRF token domain matching
            proxy_set_header Host $http_host;  # ŌåÉ Keeps original host
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Add headers for Flask to detect environment
            proxy_set_header X-Original-Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Nginx-Proxy "true";
            
            # Increased timeouts for ngrok latency
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            
            # Better buffering for ngrok
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 16 8k;
        }

        # Named location for Flask backend - FIXED HOST HEADER
        location @flask_backend {
            proxy_pass http://flask_backend;
            proxy_set_header Host $http_host;  # ŌåÉ CHANGED: Was localhost
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Original-Host $http_host;
        }
        
        # Custom error pages - UNCHANGED
        error_page 429 /rate_limit.html;
        error_page 403 /403.html;
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        
        location = /rate_limit.html {
            root /usr/share/nginx/html;
            internal;
        }
        
        location = /403.html {
            root /usr/share/nginx/html;
            internal;
        }
        
        location = /404.html {
            root /usr/share/nginx/html;
            internal;
        }
        
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}