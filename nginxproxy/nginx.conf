# /etc/nginx/nginx.conf
load_module modules/ngx_http_modsecurity_module.so;

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Security: Hide nginx version
    server_tokens off;
    
    # FIXED: Add session persistence to prevent session sharing
    upstream flask_backend {
        ip_hash;  # This ensures same IP goes to same server
        server app1:5000;
        server app2:5000;
        server app3:5000;
    }

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:50m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:50m;

    # Basic nginx configuration
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    log_format security '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for" '
                        'Host:"$host" RequestHost:"$http_host"';
    
    access_log /var/log/nginx/access.log security;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 2048M;

    # ModSecurity configuration
    modsecurity on;
    modsecurity_rules_file /etc/nginx/modsec/modsecurity.conf;

    # SECURITY: Map to detect invalid hostnames
    map $http_host $invalid_host {
        default 1;
        "localhost" 0;
        "localhost:80" 0;
        "localhost:443" 0;
    }

    # DEFAULT SERVER: Reject all invalid requests
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        
        # Separate log file for blocked hosts
        access_log /var/log/nginx/blocked_hosts.log security;
        return 444;  # Close connection without response
    }

    # HTTP SERVER - STRICT LOCALHOST ONLY
    server {
        listen 80;
        listen [::]:80;
        server_name localhost;
        
        # Normal access log for valid requests
        access_log /var/log/nginx/localhost_access.log security;
        
        # Custom error pages
        error_page 429 /rate_limit.html;
        error_page 403 /403.html;
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;

        # Error page locations
        location = /rate_limit.html {
            root /usr/share/nginx/html;
            internal;
        }
        
        location = /403.html {
            root /usr/share/nginx/html;
            internal;
        }
        
        location = /404.html {
            root /usr/share/nginx/html;
            internal;
        }
        
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }

        # Static files
        location /static/ {
            # Block invalid hosts and return 444
            if ($invalid_host) {
                return 444;
            }
            
            alias /var/www/static/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
            
            # Handle image files
            location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # WebSocket support
        location /socket.io/ {
            # Block invalid hosts
            if ($invalid_host) {
                return 444;
            }
            
            limit_req zone=api_limit burst=30 nodelay;
            
            proxy_pass http://flask_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host localhost;  # Force localhost
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Main application - NO REDIRECT HERE!
        location / {
            # Block invalid hosts without access_log in if block
            if ($invalid_host) {
                return 444;
            }
            
            # Block non-localhost Host headers
            if ($http_host != "localhost") {
                return 444;
            }
            
            # Rate limiting
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;
            limit_conn conn_limit 50;
            
            # Proxy to Flask backend
            proxy_pass http://flask_backend;
            proxy_set_header Host localhost;  # Always force localhost
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }

    # HTTPS SERVER - STRICT LOCALHOST ONLY (Comment out if no SSL certs)
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name localhost;
        
        # Normal access log for HTTPS
        access_log /var/log/nginx/localhost_https_access.log security;
    
        # SSL configuration
        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    
        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains;" always;
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Error pages (same as HTTP)
        error_page 429 /rate_limit.html;
        error_page 403 /403.html;
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;

        location = /rate_limit.html {
            root /usr/share/nginx/html;
            internal;
        }
        
        location = /403.html {
            root /usr/share/nginx/html;
            internal;
        }
        
        location = /404.html {
            root /usr/share/nginx/html;
            internal;
        }
        
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }

        # Static files (same as HTTP)
        location /static/ {
            if ($invalid_host) {
                return 444;
            }
            
            alias /var/www/static/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
            
            location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # WebSocket (same as HTTP)
        location /socket.io/ {
            if ($invalid_host) {
                return 444;
            }
            
            limit_req zone=api_limit burst=30 nodelay;
            
            proxy_pass http://flask_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Main application (same as HTTP)
        location / {
            if ($invalid_host) {
                return 444;
            }
            
            if ($http_host != "localhost") {
                return 444;
            }
            
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;
            limit_conn conn_limit 50;
             
            proxy_pass http://flask_backend;
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}