<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Post</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    {% extends 'base.html' %}

    {% block content %}
    <h1>Edit Post</h1>
    <form action="{{ url_for('edit_post', post_id=post.id) }}" method="POST" enctype="multipart/form-data">
        {{ form.hidden_tag() }}
        <div>
            <label for="title">Title:</label>
            {{ form.title(class="form-control", value=post.title) }}
        </div>
        <div>
            <label for="content">Content:</label>
            {{ form.content(class="form-control", value=post.content) }}
        </div>
        <div>
            <label for="image">Upload Image:</label>
            {{ form.image(class="form-control") }}
        </div>
        <div>
            <button type="submit" class="btn btn-primary">Update Post</button>
        </div>
    </form>
    <form action="{{ url_for('delete_post', post_id=post.id) }}" method="POST" onsubmit="return confirm('Are you sure you want to delete this post?');">
        <button type="submit" class="btn btn-danger">Delete Post</button>
    </form>
    {% endblock %}
</body>
</html>
