{% extends "UserBase.html" %}
{% block title %}Account Locked{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="alert alert-danger text-center">
        <h2>Your account is locked</h2>
        <p>
            Too many failed login attempts.<br>
            You may try again after:<br>
            <strong>{{ lockout_until }}</strong>
        </p>
        <a href="{{ url_for('login') }}" class="btn btn-primary mt-3">Back to Login</a>
    </div>
</div>
{% endblock %}
