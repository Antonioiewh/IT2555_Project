{% extends "UserBase.html" %}
{% block content %}
<div class="container mt-5" style="max-width: 600px;">
    <div class="card shadow">
        <div class="card-body">
            <h2 class="card-title mb-4 text-center">Edit Post</h2>
            <form action="{{ url_for('edit_post', post_id=post.post_id) }}" method="POST" enctype="multipart/form-data">
                {{ form.hidden_tag() }}
                <div class="mb-3">
                    <label for="content" class="form-label">Content</label>
                    {{ form.post_content(class="form-control", rows=7, placeholder="Enter Text") }}
                </div>
                <!-- Optionally show current images here -->
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">Update Post</button>
                </div>
            </form>
            <form action="/delete_post" method="POST" class="mt-3" onsubmit="return confirm('Are you sure you want to delete this post?');">
                <button type="submit" class="btn btn-danger w-100">Delete Post</button>
            </form>
            <div class="mt-3 text-center">
                <a href="/account" class="btn btn-link">Cancel</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
