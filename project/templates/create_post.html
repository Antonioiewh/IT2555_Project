{% extends "UserBase.html" %}
{% block content %}
<div class="container mt-5" style="max-width: 600px;">
    <div class="card shadow">
        <div class="card-body">
            <h2 class="card-title mb-4 text-center">Create a New Post</h2>
            <form action="/create_post" method="POST" enctype="multipart/form-data">
                {{ form.hidden_tag() }}
                <div class="mb-3">
                    <label for="content" class="form-label">Content</label>
                    {{ form.post_content(class="form-control", rows=7, placeholder="Enter Text") }}
                </div>
                <div class="mb-3">
                    <label for="image" class="form-label">Upload an Image (optional)</label>
                    {{ form.image(class="form-control", accept=".jpg,.jpeg,.png") }}
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">Create Post</button>
                </div>
            </form>
            <div class="mt-3 text-center">
                <a href="/account" class="btn btn-link">Cancel</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
