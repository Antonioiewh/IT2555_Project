{% extends "UserBase.html" %}
{% block title %}Discover Friends Page{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">Discover Friends</h2>
    <input id="search-bar" type="text" class="form-control form-control-lg mb-4" placeholder="Search users...">
    <div id="user-list">
        {% include 'user_list.html' %}
    </div>
</div>
<script>
document.getElementById('search-bar').addEventListener('input', function() {
    const query = this.value;
    fetch(`/search_users?q=${encodeURIComponent(query)}`)
        .then(response => response.json())
        .then(users => {
            const userList = document.getElementById('user-list');
            if (users.length === 0) {
                userList.innerHTML = '<div class="alert alert-info text-center">No users found.</div>';
                return;
            }
            userList.innerHTML = `
                <div class="row row-cols-1 row-cols-md-3 g-4">
                    ${users.map(user => `
                        <div class="col">
                            <div class="card h-100 text-center shadow-sm">
                                <div class="card-body d-flex flex-column align-items-center">
                                    <img src="${user.profile_pic_url}" alt="Profile Picture" class="rounded-circle mb-3" width="100" height="100">
                                    <h5 class="card-title mb-1">${user.username}</h5>
                                    ${user.bio ? `<p class="card-text text-muted small">${user.bio}</p>` : ''}
                                    <form method="post" action="/send_friend_request/${user.user_id}">
                                        ${user.pending ? `
                                            <button type="button" class="btn btn-secondary btn-sm mt-2" disabled>
                                                <i class="bi bi-hourglass-split"></i> Pending
                                            </button>
                                        ` : `
                                            <button type="submit" class="btn btn-primary btn-sm mt-2">Request</button>
                                        `}
                                    </form>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        });
});
</script>
{% endblock %}
