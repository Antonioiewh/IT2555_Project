{% extends "UserBase.html" %}
{% block content %}
<div class="container mt-4">
    <h2>Edit Profile</h2>
    <form method="POST" enctype="multipart/form-data">
        
        {{ form.hidden_tag() }}
        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            {{ form.username(class="form-control", value=user.username) }}
        </div>
        <div class="mb-3">
            <label for="profile_pic" class="form-label">Profile Picture</label><br>
            <img src="{{ url_for('static', filename='imgs/blank-profile-picture-973460_1280.webp') if not user.profile_pic_url else user.profile_pic_url }}" 
                 alt="Profile Picture" class="rounded-circle mb-2" width="100" height="100"><br>
            {{ form.image(class="form-control", accept=".jpg,.jpeg,.png") }}
        </div>
        <button type="submit" class="btn btn-success">Save Changes</button>
        <a href="/account" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
