{% extends "UserBase.html" %}
{% block title %}Discover Friends Page{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">
        <i class="bi bi-people"></i> Discover Friends
    </h2>
    <div class="row mb-4">
        <div class="col-md-8">
            <input id="search-bar" type="text" class="form-control form-control-lg" placeholder="Search users by username...">
        </div>
        <div class="col-md-4">
            <button class="btn btn-outline-secondary btn-lg w-100" onclick="clearSearch()">
                <i class="bi bi-arrow-clockwise"></i> Show All
            </button>
        </div>
    </div>
    
    <div id="user-list">
        {% include 'user_list.html' %}
    </div>
</div>

<script>
function getProfilePicUrl(user) {
    if (user.profile_pic_url && user.profile_pic_url !== '') {
        return `/static/uploads/${user.profile_pic_url}`;
    }
    return '/static/imgs/blank-profile-picture-973460_1280.webp';
}

function handleImageError(img) {
    img.src = '/static/imgs/blank-profile-picture-973460_1280.webp';
    img.onerror = null;
}

function clearSearch() {
    document.getElementById('search-bar').value = '';
    location.reload(); // Reload to show all users
}

document.getElementById('search-bar').addEventListener('input', function() {
    const query = this.value.trim();
    
    if (query.length < 2) {
        // If search is too short, reload the page to show all users
        if (query.length === 0) {
            location.reload();
        }
        return;
    }
    
    fetch(`/search_users?q=${encodeURIComponent(query)}`)
        .then(response => response.json())
        .then(users => {
            const userList = document.getElementById('user-list');
            
            if (users.length === 0) {
                userList.innerHTML = `
                    <div class="alert alert-warning text-center">
                        <i class="bi bi-search"></i>
                        <h5>No users found</h5>
                        <p>No users match your search for "${query}"</p>
                    </div>
                `;
                return;
            }
            
            userList.innerHTML = `
                <div class="row row-cols-1 row-cols-md-3 g-4">
                    ${users.map(user => `
                        <div class="col">
                            <div class="card h-100 text-center shadow-sm">
                                <div class="card-body d-flex flex-column align-items-center">
                                    <a href="/account/${user.user_id}" class="text-decoration-none">
                                        <img src="${getProfilePicUrl(user)}" 
                                             alt="${user.username}"
                                             class="rounded-circle mb-3 border" 
                                             width="100" 
                                             height="100"
                                             style="object-fit: cover;"
                                             onerror="handleImageError(this)">
                                    </a>
                                    <a href="/account/${user.user_id}" class="text-decoration-none">
                                        <h5 class="card-title mb-2 text-primary">${user.username}</h5>
                                    </a>
                                    ${user.bio ? `<p class="card-text text-muted small mb-3">${user.bio.substring(0, 50)}${user.bio.length > 50 ? '...' : ''}</p>` : ''}
                                    <div class="mt-auto d-flex flex-column gap-2 w-100">
                                        ${user.is_friend ? `
                                            <button type="button" class="btn btn-success btn-sm" disabled>
                                                <i class="bi bi-check-circle"></i> Friends
                                            </button>
                                        ` : user.pending ? `
                                            <button type="button" class="btn btn-secondary btn-sm" disabled>
                                                <i class="bi bi-hourglass-split"></i> Request Sent
                                            </button>
                                        ` : `
                                            <form method="post" action="/send_friend_request/${user.user_id}" class="w-100">
                                                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                                                <button type="submit" class="btn btn-primary btn-sm w-100">
                                                    <i class="bi bi-person-plus"></i> Add Friend
                                                </button>
                                            </form>
                                        `}
                                        <a href="/account/${user.user_id}" class="btn btn-outline-primary btn-sm w-100">
                                            <i class="bi bi-eye"></i> View Profile
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        })
        .catch(error => {
            console.error('Error fetching users:', error);
            document.getElementById('user-list').innerHTML = `
                <div class="alert alert-danger text-center">
                    <i class="bi bi-exclamation-triangle"></i>
                    <h5>Error loading users</h5>
                    <p>Please try again later.</p>
                </div>
            `;
        });
});
</script>
{% endblock %}
