# ============================================================================
# STATIC CONTENT & IMAGE HANDLING - COMPREHENSIVE RULES
# ============================================================================

# Rule 1005: All static content served by nginx (broadest rule)
SecRule REQUEST_URI "@beginsWith /static/" \
    "id:1005,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleEngine=Off"

# Rule 1006: Image files anywhere in the application
SecRule REQUEST_URI "@rx \.(jpe?g|png|gif|ico|svg|webp|bmp|tiff?|avif)$" \
    "id:1006,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleEngine=Off"

# Rule 1007: User upload directory (if served through Flask)
SecRule REQUEST_URI "@beginsWith /uploads/" \
    "id:1007,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleEngine=Off"

# Rule 1008: Common asset directories
SecRule REQUEST_URI "@rx ^/(assets|img|images|media|files)/" \
    "id:1008,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleEngine=Off"

# Rule 1009: Font files (often cause false positives)
SecRule REQUEST_URI "@rx \.(woff2?|ttf|eot|otf)$" \
    "id:1009,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleEngine=Off"

# Rule 1010: CSS and JS files
SecRule REQUEST_URI "@rx \.(css|js|map)$" \
    "id:1010,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleEngine=Off"

# Rule 1011: Favicon and robots.txt
SecRule REQUEST_URI "@rx ^/(favicon\.ico|robots\.txt|sitemap\.xml)$" \
    "id:1011,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleEngine=Off"

# Rule 1012: Profile images specifically (your Flask route pattern)
SecRule REQUEST_URI "@rx /profile_image/\d+$" \
    "id:1012,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleEngine=Off"

# ============================================================================
# WHITELIST FOR IMAGE UPLOAD ENDPOINTS
# ============================================================================

# Whitelist edit_profile endpoint for base64 image uploads
SecRule REQUEST_URI "@streq /edit_profile" \
    "id:1000,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=932235,\
    ctl:ruleRemoveById=932260,\
    ctl:ruleRemoveById=934170,\
    ctl:ruleRemoveById=941130,\
    ctl:ruleRemoveById=941170"

# Additional rule to specifically allow base64 image data in cropped_image_data field
SecRule ARGS:cropped_image_data "@rx ^data:image/(jpeg|jpg|png);base64," \
    "id:1001,\
    phase:2,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=932235,\
    ctl:ruleRemoveById=932260,\
    ctl:ruleRemoveById=934170,\
    ctl:ruleRemoveById=941130,\
    ctl:ruleRemoveById=941170"

# Comprehensive whitelist for edit_profile form submissions
SecRule REQUEST_URI "@streq /edit_profile" \
    "id:1002,\
    phase:2,\
    pass,\
    nolog,\
    ctl:ruleRemoveTargetById=932235;ARGS:cropped_image_data,\
    ctl:ruleRemoveTargetById=932260;ARGS:cropped_image_data,\
    ctl:ruleRemoveTargetById=934170;ARGS:cropped_image_data,\
    ctl:ruleRemoveTargetById=941130;ARGS:cropped_image_data,\
    ctl:ruleRemoveTargetById=941170;ARGS:cropped_image_data"

# Whitelist for banner uploads
SecRule REQUEST_URI "@streq /upload_banner" \
    "id:1003,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=932235,\
    ctl:ruleRemoveById=932260,\
    ctl:ruleRemoveById=934170,\
    ctl:ruleRemoveById=941130,\
    ctl:ruleRemoveById=941170"

# Whitelist for post image uploads
SecRule REQUEST_URI "@streq /create_post" \
    "id:1004,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=932235,\
    ctl:ruleRemoveById=932260,\
    ctl:ruleRemoveById=934170,\
    ctl:ruleRemoveById=941130,\
    ctl:ruleRemoveById=941170"

# ============================================================================
# RATE LIMITING WITH IMAGE EXCLUSIONS
# ============================================================================

# Initialize IP collection for tracking (exclude static content)
SecRule REQUEST_URI "!@rx ^/(static|uploads|assets|img|images|media)/" \
    "id:9001,\
    phase:1,\
    nolog,\
    pass,\
    initcol:ip=%{remote_addr}"

# Progressive Rate Limiting with Persistent Blocking
# =================================================

# Initialize IP collection for tracking
SecAction \
    "id:9001,\
    phase:1,\
    nolog,\
    pass,\
    initcol:ip=%{remote_addr}"

# Initialize request tracking if not exists
SecRule &IP:REQUESTS_1MIN "@eq 0" \
    "id:9002,\
    phase:1,\
    nolog,\
    pass,\
    setvar:ip.requests_1min=0,\
    setvar:ip.last_reset=%{time_epoch},\
    setvar:ip.violation_level=0,\
    setvar:ip.block_until=0"

# Reset request counter every minute
SecRule IP:LAST_RESET "@lt %{time_epoch}" \
    "id:9003,\
    phase:1,\
    nolog,\
    pass,\
    setvar:ip.requests_1min=0,\
    setvar:ip.last_reset=%{time_epoch},\
    setvar:ip.last_reset=+60"

# Check if IP is currently blocked
SecRule IP:BLOCK_UNTIL "@gt %{time_epoch}" \
    "id:9004,\
    phase:1,\
    deny,\
    status:429,\
    msg:'IP temporarily blocked due to rate limiting violations',\
    logdata:'IP: %{remote_addr}, Blocked until: %{ip.block_until}, Current time: %{time_epoch}',\
    setvar:tx.rate_limit_blocked=1"

# Increment request counter
SecAction \
    "id:9005,\
    phase:1,\
    nolog,\
    pass,\
    setvar:ip.requests_1min=+1"

# Level 1: Warning (10+ requests per minute)
SecRule IP:REQUESTS_1MIN "@gt 50" \
    "id:9010,\
    phase:1,\
    pass,\
    nolog,\
    chain"
    SecRule IP:VIOLATION_LEVEL "@lt 1" \
        "setvar:ip.violation_level=1,\
        setvar:ip.warning_time=%{time_epoch},\
        msg:'Rate limit warning - Level 1',\
        logdata:'IP: %{remote_addr} exceeded 50 requests/minute'"

# Level 2: Temporary block (30+ requests per minute)
SecRule IP:REQUESTS_1MIN "@gt 30" \
    "id:9020,\
    phase:1,\
    deny,\
    status:429,\
    chain"
    SecRule IP:VIOLATION_LEVEL "@lt 2" \
        "setvar:ip.violation_level=2,\
        setvar:ip.block_until=%{time_epoch},\
        setvar:ip.block_until=+60,\
        msg:'Rate limit exceeded - 1 minute block',\
        logdata:'IP: %{remote_addr} blocked for 1 minute'"

# Level 3: Extended block (90+ requests per minute)
SecRule IP:REQUESTS_1MIN "@gt 90" \
    "id:9030,\
    phase:1,\
    deny,\
    status:429,\
    chain"
    SecRule IP:VIOLATION_LEVEL "@lt 3" \
        "setvar:ip.violation_level=3,\
        setvar:ip.block_until=%{time_epoch},\
        setvar:ip.block_until=+300,\
        msg:'Rate limit exceeded - 5 minute block',\
        logdata:'IP: %{remote_addr} blocked for 5 minutes'"

# Level 4: Long block (100+ requests per minute)
SecRule IP:REQUESTS_1MIN "@gt 100" \
    "id:9040,\
    phase:1,\
    deny,\
    status:429,\
    chain"
    SecRule IP:VIOLATION_LEVEL "@lt 4" \
        "setvar:ip.violation_level=4,\
        setvar:ip.block_until=%{time_epoch},\
        setvar:ip.block_until=+900,\
        msg:'Rate limit exceeded - 15 minute block',\
        logdata:'IP: %{remote_addr} blocked for 15 minutes'"

# Level 5: Extended punishment (120+ requests per minute)
SecRule IP:REQUESTS_1MIN "@gt 120" \
    "id:9050,\
    phase:1,\
    deny,\
    status:403,\
    setvar:ip.violation_level=5,\
    setvar:ip.block_until=%{time_epoch},\
    setvar:ip.block_until=+3600,\
    msg:'Severe rate limit violation - 1 hour block',\
    logdata:'IP: %{remote_addr} blocked for 1 hour'"

# Gradual cooldown system - reduce violation level over time
SecRule IP:VIOLATION_LEVEL "@gt 0" \
    "id:9060,\
    phase:1,\
    nolog,\
    pass,\
    chain"
    SecRule IP:WARNING_TIME "@lt %{time_epoch}" \
        "setvar:ip.violation_level=-1,\
        setvar:ip.warning_time=%{time_epoch},\
        setvar:ip.warning_time=+1800"

# Reset violation level to 0 when it goes negative
SecRule IP:VIOLATION_LEVEL "@lt 0" \
    "id:9061,\
    phase:1,\
    nolog,\
    pass,\
    setvar:ip.violation_level=0"